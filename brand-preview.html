<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --terracotta: #C9622F;
      --cream: #FAF7F2;
      --navy: #1B3A5C;
      --gold: #D4AF37;
      --forest: #2D5A27;
      --mint: #7EC8A4;
      --slate: #4A5568;
      --coral: #FF6B6B;
      --warmblack: #1A1A1A;
      --sand: #E8D5B7;
      --indigo: #3730A3;
      --amber: #F59E0B;
      --olive: #6B7A3E;
      --bg: #F2EDE8;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --subtext: #6B7280;
      --border: #E5E0D8;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--warmblack);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    header span {
      font-size: 0.75rem;
      opacity: 0.5;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .filters {
      display: flex;
      gap: 8px;
      padding: 20px 32px;
      flex-wrap: wrap;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .filter-btn {
      padding: 7px 16px;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--subtext);
    }

    .filter-btn:hover { border-color: var(--warmblack); color: var(--warmblack); }
    .filter-btn.active { background: var(--warmblack); color: white; border-color: var(--warmblack); }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 24px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 760px) { .grid { grid-template-columns: repeat(2, 1fr); padding: 16px; } }
    @media (max-width: 420px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    .card:hover .copy-btn { opacity: 1; }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      min-height: 180px;
    }

    .card-info {
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
    }

    .card-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--subtext);
      line-height: 1.4;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 100px;
      margin-bottom: 6px;
    }

    .tag-icon { background: #EEF2FF; color: #3730A3; }
    .tag-wordmark { background: #FFF7ED; color: #C2410C; }
    .tag-geometric { background: #F0FDF4; color: #15803D; }
    .tag-combined { background: #FFF1F2; color: #BE123C; }
    .tag-special { background: #FEFCE8; color: #92400E; }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .copy-btn:hover { background: var(--warmblack); color: white; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 20px;
      max-width: 600px;
      width: 90%;
      overflow: hidden;
      position: relative;
    }

    .modal-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      min-height: 320px;
    }

    .modal-logo svg { max-width: 380px; max-height: 260px; }

    .modal-info {
      padding: 20px 28px 28px;
      border-top: 1px solid var(--border);
    }

    .modal-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .modal-desc {
      font-size: 0.9rem;
      color: var(--subtext);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-copy-btn {
      padding: 9px 18px;
      background: var(--warmblack);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--subtext);
    }

    .modal-close:hover { background: var(--warmblack); color: white; }

    /* Number badge */
    .concept-num {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--subtext);
      opacity: 0.5;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>Conceptos de Logo — ViajeraMente</h1>
  <span>Uso interno · No publicar</span>
</header>

<div class="filters">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="icon">Icono</button>
  <button class="filter-btn" data-filter="wordmark">Wordmark</button>
  <button class="filter-btn" data-filter="geometric">Geométrico</button>
  <button class="filter-btn" data-filter="combined">Combinado</button>
  <button class="filter-btn" data-filter="special">Especial</button>
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modal-close">×</button>
    <div class="modal-logo" id="modal-logo"></div>
    <div class="modal-info">

      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-actions">
        <button class="modal-copy-btn" id="modal-copy">Copiar SVG</button>
      </div>
    </div>
  </div>
</div>

// ── RENDER ──────────────────────────────────────────────────────────────────

const tagMap = {
  icon: { label: 'Icono', cls: 'tag-icon' },
  wordmark: { label: 'Wordmark', cls: 'tag-wordmark' },
  geometric: { label: 'Geométrico', cls: 'tag-geometric' },
  combined: { label: 'Combinado', cls: 'tag-combined' },
  special: { label: 'Especial', cls: 'tag-special' },
};

function renderGrid(filter = 'all') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  concepts.forEach(c => {
    if (filter !== 'all' && c.cat !== filter) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = c.id;
    const tag = tagMap[c.cat];
    card.innerHTML = `
      <span class="concept-num">#${c.id}</span>
      <button class="copy-btn" data-id="${c.id}">Copiar SVG</button>
      <div class="logo-area" style="background:${c.bg}">${c.svg}</div>
      <div class="card-info">
        <div class="card-tag ${tag.cls}">${tag.label}</div>
        <div class="card-name">${c.name}</div>
        <div class="card-desc">${c.desc}</div>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('copy-btn')) return;
      openModal(c);
    });
    card.querySelector('.copy-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      copySVG(c);
    });
    grid.appendChild(card);
  });
}

function openModal(c) {
  const tag = tagMap[c.cat];
  document.getElementById('modal-logo').style.background = c.bg;
  document.getElementById('modal-logo').innerHTML = c.svg;
  document.getElementById('modal-name').innerHTML = `<span class="card-tag ${tag.cls}" style="margin-right:8px">${tag.label}</span>${c.name}`;
  document.getElementById('modal-desc').textContent = c.desc;
  document.getElementById('modal-copy').onclick = () => copySVG(c);
  document.getElementById('modal').classList.add('open');
}

function copySVG(c) {
  navigator.clipboard.writeText(c.svg).then(() => {
    const btn = document.querySelector(`[data-id="${c.id}"].copy-btn`) || document.getElementById('modal-copy');
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = orig, 1800);
  });
}

// filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.filter);
  });
});

// modal close
document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('open');
});
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('modal').classList.remove('open');
});

renderGrid();
</script>
