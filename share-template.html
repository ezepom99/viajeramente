<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViajeraMente Share Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0A1628;
    overflow: hidden;
  }

  /* ── STORY FORMAT (1080x1920) ── */
  .share-card {
    width: 1080px;
    height: 1920px;
    background: linear-gradient(170deg, #0A1628 0%, #0F1D35 30%, #0A1628 60%, #111827 100%);
    position: relative;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Subtle background pattern */
  .share-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(14,165,233,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 70%, rgba(16,185,129,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ── OG FORMAT (1200x630) ── */
  .share-card.og-format {
    width: 1200px;
    height: 630px;
    flex-direction: row;
  }

  /* ── HEADER ── */
  .card-header {
    position: relative;
    z-index: 2;
    padding: 60px 60px 0;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .og-format .card-header {
    flex-direction: column;
    align-items: flex-start;
    padding: 40px 40px 0;
    width: 45%;
    justify-content: center;
  }

  .avatar-circle {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    border: 3px solid rgba(14,165,233,0.6);
    background: linear-gradient(135deg, #0EA5E9 0%, #10B981 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 30px rgba(14,165,233,0.3);
  }

  .avatar-circle img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
  }

  .header-info {
    flex: 1;
  }

  .user-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    color: #fff;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }

  .og-format .user-name {
    font-size: 1.8rem;
  }

  .level-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.95rem;
    font-weight: 700;
    margin-top: 10px;
    background: rgba(14,165,233,0.15);
    border: 1px solid rgba(14,165,233,0.3);
    color: #0EA5E9;
  }
  .level-pill.gold {
    background: rgba(245,158,11,0.15);
    border-color: rgba(245,158,11,0.3);
    color: #F59E0B;
  }
  .level-pill.diamond {
    background: rgba(14,165,233,0.2);
    border-color: rgba(14,165,233,0.4);
    color: #38BDF8;
  }
  .level-pill.sapphire {
    background: rgba(124,58,237,0.2);
    border-color: rgba(124,58,237,0.4);
    color: #A78BFA;
  }

  /* ── MAP SECTION ── */
  .map-section {
    flex: 1;
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px 40px;
  }

  .og-format .map-section {
    width: 55%;
    padding: 20px 30px;
  }

  #shareMap {
    width: 100%;
    max-height: 100%;
  }

  #shareMap .country-visited {
    fill: #0EA5E9;
    filter: drop-shadow(0 0 6px rgba(14,165,233,0.5));
    transition: fill 0.3s;
  }

  #shareMap .country-unvisited {
    fill: #1E293B;
    stroke: #334155;
    stroke-width: 0.3;
  }

  /* Glow effect on visited countries */
  .map-glow {
    filter: url(#glow);
  }

  /* ── STATS SECTION ── */
  .stats-section {
    position: relative;
    z-index: 2;
    padding: 0 60px 30px;
  }

  .og-format .stats-section {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 45%;
    padding: 0 40px 30px;
  }

  .stats-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px 0;
  }

  .stat-divider {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    flex-shrink: 0;
  }

  .stat-item {
    text-align: center;
  }

  .stat-number {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.6rem;
    font-weight: 800;
    color: #fff;
    line-height: 1;
  }

  .og-format .stat-number {
    font-size: 1.6rem;
  }

  .stat-label {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-top: 4px;
  }

  .og-format .stat-label {
    font-size: 0.7rem;
  }

  /* ── CONTINENT BADGES ── */
  .continents-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    padding: 10px 60px 20px;
    position: relative;
    z-index: 2;
  }

  .og-format .continents-row {
    display: none;
  }

  .continent-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .continent-badge.visited {
    color: #0EA5E9;
    background: rgba(14,165,233,0.1);
    border-color: rgba(14,165,233,0.25);
  }

  /* ── SUMMARY LINE ── */
  .summary-line {
    text-align: center;
    padding: 10px 60px;
    position: relative;
    z-index: 2;
  }

  .summary-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.02em;
  }

  .summary-text .highlight {
    color: #0EA5E9;
    font-weight: 800;
  }

  /* ── BRANDING FOOTER ── */
  .brand-footer {
    position: relative;
    z-index: 2;
    padding: 30px 60px 50px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .og-format .brand-footer {
    position: absolute;
    bottom: 8px;
    right: 30px;
    padding: 0;
    align-items: flex-end;
  }

  .brand-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: rgba(255,255,255,0.8);
    letter-spacing: -0.02em;
  }

  .brand-url {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
  }

  .brand-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border-radius: 100px;
    background: linear-gradient(135deg, #0EA5E9, #0284C7);
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    margin-top: 12px;
    box-shadow: 0 4px 20px rgba(14,165,233,0.4);
  }

  .og-format .brand-cta {
    display: none;
  }
</style>
</head>
<body>

<div class="share-card" id="shareCard">

  <!-- SVG filter for glow -->
  <svg width="0" height="0" style="position:absolute;">
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.054  0 0 0 0 0.647  0 0 0 0 0.913  0 0 0 0.4 0" result="colored"/>
        <feMerge>
          <feMergeNode in="colored"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  </svg>

  <!-- HEADER -->
  <div class="card-header">
    <div class="avatar-circle" id="avatarCircle">
      <!-- JS fills initial or img -->
    </div>
    <div class="header-info">
      <div class="user-name" id="userName">Viajero</div>
      <div class="level-pill" id="levelPill">Explorador</div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-section">
    <svg id="shareMap" viewBox="-10 -10 980 510"></svg>
  </div>

  <!-- STATS -->
  <div class="stats-section">
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-number" id="sCountries">0</div>
        <div class="stat-label">Paises</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-number" id="sContinents">0</div>
        <div class="stat-label">Continentes</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-number" id="sCities">0</div>
        <div class="stat-label">Ciudades</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <div class="stat-number" id="sKm">0</div>
        <div class="stat-label">Km</div>
      </div>
    </div>
  </div>

  <!-- CONTINENT BADGES -->
  <div class="continents-row" id="continentBadges"></div>

  <!-- SUMMARY -->
  <div class="summary-line">
    <div class="summary-text" id="summaryText"></div>
  </div>

  <!-- BRANDING -->
  <div class="brand-footer">
    <div class="brand-logo">ViajeraMente</div>
    <div class="brand-url" id="brandUrl">viajeramente.com/p/usuario</div>
    <div class="brand-cta">Crea tu mapa de viajes</div>
  </div>

</div>

<!-- D3 + TopoJSON for map rendering -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<script>
// Data injected by server
const SHARE_DATA = window.__SHARE_DATA__ || {};

// Country numeric ID → ISO Alpha-2 mapping (world-atlas uses numeric IDs)
const NUM_TO_ISO2 = {4:"AF",8:"AL",12:"DZ",16:"AS",20:"AD",24:"AO",28:"AG",31:"AZ",32:"AR",36:"AU",40:"AT",44:"BS",48:"BH",50:"BD",51:"AM",56:"BE",64:"BT",68:"BO",70:"BA",72:"BW",76:"BR",84:"BZ",90:"SB",96:"BN",100:"BG",104:"MM",108:"BI",112:"BY",116:"KH",120:"CM",124:"CA",132:"CV",140:"CF",144:"LK",148:"TD",152:"CL",156:"CN",158:"TW",170:"CO",174:"KM",178:"CG",180:"CD",188:"CR",191:"HR",192:"CU",196:"CY",203:"CZ",204:"BJ",208:"DK",214:"DO",218:"EC",818:"EG",222:"SV",226:"GQ",231:"ET",232:"ER",233:"EE",242:"FJ",246:"FI",250:"FR",266:"GA",268:"GE",270:"GM",275:"PS",276:"DE",288:"GH",300:"GR",308:"GD",320:"GT",324:"GN",328:"GY",332:"HT",340:"HN",348:"HU",352:"IS",356:"IN",360:"ID",364:"IR",368:"IQ",372:"IE",376:"IL",380:"IT",384:"CI",388:"JM",392:"JP",398:"KZ",400:"JO",404:"KE",408:"KP",410:"KR",414:"KW",417:"KG",418:"LA",422:"LB",426:"LS",428:"LV",430:"LR",434:"LY",438:"LI",440:"LT",442:"LU",450:"MG",454:"MW",458:"MY",462:"MV",466:"ML",470:"MT",478:"MR",480:"MU",484:"MX",496:"MN",498:"MD",499:"ME",504:"MA",508:"MZ",512:"OM",516:"NA",520:"NR",524:"NP",528:"NL",540:"NC",554:"NZ",558:"NI",562:"NE",566:"NG",578:"NO",586:"PK",591:"PA",598:"PG",600:"PY",604:"PE",608:"PH",616:"PL",620:"PT",634:"QA",642:"RO",643:"RU",646:"RW",682:"SA",686:"SN",688:"RS",694:"SL",702:"SG",703:"SK",704:"VN",705:"SI",706:"SO",710:"ZA",716:"ZW",724:"ES",728:"SS",729:"SD",740:"SR",748:"SZ",752:"SE",756:"CH",760:"SY",762:"TJ",764:"TH",768:"TG",780:"TT",784:"AE",788:"TN",792:"TR",795:"TM",800:"UG",804:"UA",826:"GB",834:"TZ",840:"US",854:"BF",858:"UY",860:"UZ",862:"VE",887:"YE",894:"ZM"};

async function render() {
  const data = SHARE_DATA;
  const format = data.format || 'story';
  const card = document.getElementById('shareCard');

  if (format === 'og') {
    card.classList.add('og-format');
  }

  // Avatar
  const avatarEl = document.getElementById('avatarCircle');
  if (data.avatar_url) {
    avatarEl.innerHTML = `<img src="${data.avatar_url}" alt="${data.name}" />`;
  } else {
    avatarEl.textContent = (data.name || 'V').charAt(0).toUpperCase();
  }

  // Name & level
  document.getElementById('userName').textContent = data.name || 'Viajero';
  const pill = document.getElementById('levelPill');
  pill.textContent = data.rank_level || data.travel_level || 'Explorador';
  if (data.travel_level_class) pill.classList.add(data.travel_level_class);

  // Stats
  const countries = data.countries_count || 0;
  const cities = data.cities_count || 0;
  const continents = data.continents_count || 0;
  const km = data.total_km || 0;
  const kmFmt = km >= 1000 ? Math.round(km / 1000) + 'k' : String(km);

  document.getElementById('sCountries').textContent = countries;
  document.getElementById('sContinents').textContent = continents;
  document.getElementById('sCities').textContent = cities;
  document.getElementById('sKm').textContent = kmFmt;

  // Continent badges (story only)
  const ALL_CONTINENTS = [
    { key: 'Europa', emoji: '🇪🇺' },
    { key: 'America', emoji: '🌎' },
    { key: 'Asia', emoji: '🌏' },
    { key: 'Africa', emoji: '🌍' },
    { key: 'Oceania', emoji: '🏝️' },
    { key: 'Antartica', emoji: '🧊' },
  ];

  // Normalize continent names
  const visitedContinents = new Set((data.continents_list || []).map(c => {
    const n = c.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    if (n.includes('americ') || n === 'américa') return 'America';
    if (n.includes('europ')) return 'Europa';
    if (n.includes('asia')) return 'Asia';
    if (n.includes('afric')) return 'Africa';
    if (n.includes('ocean')) return 'Oceania';
    if (n.includes('antar')) return 'Antartica';
    return c;
  }));

  const badgesHtml = ALL_CONTINENTS.map(c => {
    const visited = visitedContinents.has(c.key);
    return `<div class="continent-badge ${visited ? 'visited' : ''}">${c.emoji} ${c.key}</div>`;
  }).join('');
  document.getElementById('continentBadges').innerHTML = badgesHtml;

  // Summary
  const summaryParts = [];
  if (countries > 0) summaryParts.push(`<span class="highlight">${countries}</span> paises`);
  if (continents > 0) summaryParts.push(`<span class="highlight">${continents}</span> continentes`);
  if (km > 0) summaryParts.push(`<span class="highlight">${kmFmt}</span> km`);
  document.getElementById('summaryText').innerHTML = summaryParts.join(' · ');

  // Brand URL
  document.getElementById('brandUrl').textContent = `viajeramente.com/p/${data.username || 'viajero'}`;

  // Render map
  await renderMap(data.visited_codes || []);
}

async function renderMap(visitedCodes) {
  const visitedSet = new Set(visitedCodes.map(c => c.toUpperCase()));

  try {
    const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const countries = topojson.feature(world, world.objects.countries);

    const svg = d3.select('#shareMap');
    const projection = d3.geoNaturalEarth1()
      .scale(195)
      .translate([480, 260]);

    const path = d3.geoPath().projection(projection);

    svg.selectAll('path')
      .data(countries.features)
      .enter().append('path')
      .attr('d', path)
      .attr('class', d => {
        const iso2 = NUM_TO_ISO2[d.id];
        return visitedSet.has(iso2) ? 'country-visited' : 'country-unvisited';
      });

  } catch(e) {
    console.error('Map load error:', e);
  }
}

// Init
render().then(() => {
  // Signal to Playwright that rendering is complete
  window.__RENDER_COMPLETE__ = true;
});
</script>
</body>
</html>
