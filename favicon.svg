<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E8734A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9622F;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="pinGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#F5A06B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9622F;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- Compass rose outer ring -->
  <circle cx="50" cy="44" r="26" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- Compass cardinal points (N, S, E, W) as triangular arrows -->
  <!-- North point (top, larger) -->
  <polygon points="50,18 54,32 50,29 46,32" fill="white"/>
  <!-- South point (bottom) -->
  <polygon points="50,70 54,56 50,59 46,56" fill="rgba(255,255,255,0.5)"/>
  <!-- East point (right) -->
  <polygon points="76,44 62,40 65,44 62,48" fill="rgba(255,255,255,0.5)"/>
  <!-- West point (left) -->
  <polygon points="24,44 38,40 35,44 38,48" fill="rgba(255,255,255,0.5)"/>

  <!-- Center dot -->
  <circle cx="50" cy="44" r="4" fill="white"/>
  <circle cx="50" cy="44" r="2" fill="#C9622F"/>

  <!-- Map pin tail -->
  <path d="M 47 68 Q 50 80 50 86 Q 50 80 53 68 Q 51 70 50 71 Q 49 70 47 68 Z" fill="white" opacity="0.9"/>

  <!-- N letter -->
  <text x="50" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white" opacity="0.9">N</text>
</svg>
