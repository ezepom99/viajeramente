<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicia sesión — ViajeraMente</title>
  <meta name="description" content="Inicia sesión en ViajeraMente y sigue explorando el mundo con tu comunidad de viajeros.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T1HJ3PJWYN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T1HJ3PJWYN');
  </script>
  <style>
    /* login.html — page-specific styles */
    body {
      background: var(--bg-soft);
      display: flex; flex-direction: column;
    }

    /* DEPRECATED - now in nav.js */
    /*
    nav { position: static; ... }
    */

    /* Main content area */
    .main {
      flex: 1; display: flex;
      align-items: center; justify-content: center;
      padding: 32px 20px 60px;
    }

    .btn-primary {
      display: block; width: 100%; margin-top: 24px;
      position: relative;
    }
    .btn-primary .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .spinner { display: block; }

    /* ── General error ── */
    .general-error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.82rem;
      color: #DC2626;
      margin-bottom: 18px;
      display: none;
      text-align: center;
    }
    .general-error.visible { display: block; }

    /* ── Link ── */
    .auth-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.84rem;
      color: var(--text-secondary);
    }
    .auth-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .auth-link a:hover {
      color: var(--accent-text);
    }

    /* DEPRECATED - now in nav.js */
    /*
    footer { text-align: center; ... }
    */

    /* ── Mobile ── */
    @media (max-width: 520px) {
      .auth-card {
        padding: 28px 20px;
        border-radius: 16px;
        box-shadow: none;
        border: none;
        background: transparent;
      }
      .main { padding: 16px 16px 48px; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <main class="main">
    <div class="auth-card">
      <div class="logo-top">
        <a href="index.html">
          <span class="logo-dot"></span>
          ViajeraMente
        </a>
      </div>

      <h1>Bienvenido de vuelta</h1>
      <p class="subtitle">Inicia sesión para seguir explorando</p>

      <div class="general-error" id="generalError"></div>

      <form id="loginForm" novalidate autocomplete="on">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
          <div class="error-msg" id="emailError">Ingresa un email válido</div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
          <div class="error-msg" id="passwordError">Ingresa tu contraseña</div>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-text">Entrar</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="auth-link">
        ¿No tienes cuenta? <a href="signup.html">Regístrate</a>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = 'https://eze.saypeter.com';

    // If already logged in, go to main.html (or ?next= destination)
    (function() {
      const existingToken = localStorage.getItem('token');
      if (existingToken) {
        const nextUrl = new URLSearchParams(window.location.search).get('next');
        window.location.replace(nextUrl ? decodeURIComponent(nextUrl) : 'main.html');
      }
    })();

    // Show expired session message if redirected from auth failure
    if (new URLSearchParams(window.location.search).get('expired') === '1') {
      const generalError = document.getElementById('generalError');
      if (generalError) {
        generalError.textContent = 'Tu sesión expiró. Inicia sesión de nuevo.';
        generalError.classList.add('visible');
      }
    }

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const generalError = document.getElementById('generalError');

    function clearErrors() {
      document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('visible'));
      document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
      generalError.classList.remove('visible');
    }

    function showError(inputId, errorId) {
      document.getElementById(inputId).classList.add('error');
      document.getElementById(errorId).classList.add('visible');
    }

    function validate() {
      clearErrors();
      let valid = true;

      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(emailInput.value.trim())) {
        showError('email', 'emailError');
        valid = false;
      }

      if (!passwordInput.value) {
        showError('password', 'passwordError');
        valid = false;
      }

      return valid;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || data.detail || 'Email o contraseña incorrectos');
        }

        if (data.token) {
          localStorage.setItem('token', data.token);
        }
        if (data.access_token) {
          localStorage.setItem('token', data.access_token);
        }
        localStorage.setItem('token', data.token || data.access_token);
        localStorage.setItem('user_email', data.email || data.user?.email || '');
        localStorage.setItem('user_name', data.name || data.user?.name || '');
        localStorage.setItem('token_stored_at', Date.now().toString());

        const nextUrl = new URLSearchParams(window.location.search).get('next');
        window.location.href = nextUrl ? decodeURIComponent(nextUrl) : 'main.html';
      } catch (err) {
        generalError.textContent = err.message;
        generalError.classList.add('visible');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });

    // Clear field errors on input
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('error');
        const errorEl = document.getElementById(input.id + 'Error');
        if (errorEl) errorEl.classList.remove('visible');
      });
    });
  </script>

<script src="nav.js" data-page="" data-bottom-nav="false" data-footer="true"></script>
</body>
</html>
