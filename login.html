<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicia sesión — ViajeraMente</title>
  <meta name="description" content="Inicia sesión en ViajeraMente y sigue explorando el mundo con tu comunidad de viajeros.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T1HJ3PJWYN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T1HJ3PJWYN');
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; max-width: 100%; }

    :root {
      --bg: #FFFFFF;
      --bg-soft: #F8FAFC;
      --bg-card: #FFFFFF;
      --bg-input: #F3F4F6;
      --text: #0F172A;
      --text-secondary: #64748B;
      --text-muted: #9CA3AF;
      --border: #E2E8F0;
      --border-focus: #374151;
      --accent: #0EA5E9;
      --accent-light: #E0F2FE;
      --accent-text: #0284C7;
      --teal: #10B981;
      --teal-light: #F0FDFA;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background: var(--bg-soft);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 15px;
      line-height: 1.5;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Nav ── */
    nav {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 max(24px, calc((100% - 1200px) / 2 + 24px));
      height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideDown 0.4s ease-out;
    }
    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    .nav-logo:hover { opacity: 0.75; }
    .nav-logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .nav-back {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .nav-back:hover { color: var(--text); }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 60px;
    }

    /* ── Card ── */
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: var(--shadow-md);
      animation: fadeInUp 0.5s ease-out both;
    }

    .logo-top {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-top a {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    .logo-top .logo-dot {
      width: 9px; height: 9px;
      background: var(--accent);
      border-radius: 50%;
    }

    .auth-card h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .auth-card .subtitle {
      font-size: 0.88rem;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--bg-input);
      border: 1.5px solid transparent;
      border-radius: 11px;
      outline: none;
      transition: all 0.2s;
    }
    .form-group input::placeholder {
      color: var(--text-muted);
    }
    .form-group input:focus {
      border-color: var(--border-focus);
      background: var(--bg);
      box-shadow: none;
    }
    .form-group input.error {
      border-color: #EF4444;
      background: #FEF2F2;
    }
    .form-group .error-msg {
      font-size: 0.75rem;
      color: #EF4444;
      margin-top: 5px;
      display: none;
    }
    .form-group .error-msg.visible {
      display: block;
    }

    /* ── Button ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 13px 24px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 24px;
      position: relative;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover {
      background: var(--accent-text);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(14, 165, 233, 0.22);
    }
    .btn-primary:active {
      transform: translateY(0);
      box-shadow: none;
    }
    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }
    .btn-primary .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .spinner { display: block; }

    /* ── General error ── */
    .general-error {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.82rem;
      color: #DC2626;
      margin-bottom: 18px;
      display: none;
      text-align: center;
    }
    .general-error.visible { display: block; }

    /* ── Link ── */
    .auth-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.84rem;
      color: var(--text-secondary);
    }
    .auth-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .auth-link a:hover {
      color: var(--accent-text);
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px 24px 28px;
      font-size: 0.74rem;
      color: var(--text-muted);
    }

    /* ── Mobile ── */
    @media (max-width: 520px) {
      .auth-card {
        padding: 28px 20px;
        border-radius: 16px;
        box-shadow: none;
        border: none;
        background: transparent;
      }
      .main { padding: 16px 16px 48px; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-dot"></span>
      ViajeraMente
    </a>
    <a href="index.html" class="nav-back">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Volver a inicio
    </a>
  </nav>

  <main class="main">
    <div class="auth-card">
      <div class="logo-top">
        <a href="index.html">
          <span class="logo-dot"></span>
          ViajeraMente
        </a>
      </div>

      <h1>Bienvenido de vuelta</h1>
      <p class="subtitle">Inicia sesión para seguir explorando</p>

      <div class="general-error" id="generalError"></div>

      <form id="loginForm" novalidate autocomplete="on">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email">
          <div class="error-msg" id="emailError">Ingresa un email válido</div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
          <div class="error-msg" id="passwordError">Ingresa tu contraseña</div>
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-text">Entrar</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="auth-link">
        ¿No tienes cuenta? <a href="signup.html">Regístrate</a>
      </div>
    </div>
  </main>

  <footer>&copy; 2026 ViajeraMente</footer>

  <script>
    const API_BASE = 'https://eze.saypeter.com';

    // If already logged in, go to main.html (or ?next= destination)
    (function() {
      const existingToken = localStorage.getItem('token');
      if (existingToken) {
        const nextUrl = new URLSearchParams(window.location.search).get('next');
        window.location.replace(nextUrl ? decodeURIComponent(nextUrl) : 'main.html');
      }
    })();

    // Show expired session message if redirected from auth failure
    if (new URLSearchParams(window.location.search).get('expired') === '1') {
      const generalError = document.getElementById('generalError');
      if (generalError) {
        generalError.textContent = 'Tu sesión expiró. Inicia sesión de nuevo.';
        generalError.classList.add('visible');
      }
    }

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const generalError = document.getElementById('generalError');

    function clearErrors() {
      document.querySelectorAll('.error-msg').forEach(el => el.classList.remove('visible'));
      document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
      generalError.classList.remove('visible');
    }

    function showError(inputId, errorId) {
      document.getElementById(inputId).classList.add('error');
      document.getElementById(errorId).classList.add('visible');
    }

    function validate() {
      clearErrors();
      let valid = true;

      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRe.test(emailInput.value.trim())) {
        showError('email', 'emailError');
        valid = false;
      }

      if (!passwordInput.value) {
        showError('password', 'passwordError');
        valid = false;
      }

      return valid;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validate()) return;

      submitBtn.classList.add('loading');
      submitBtn.disabled = true;

      try {
        const res = await fetch(`${API_BASE}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || data.detail || 'Email o contraseña incorrectos');
        }

        if (data.token) {
          localStorage.setItem('token', data.token);
        }
        if (data.access_token) {
          localStorage.setItem('token', data.access_token);
        }
        localStorage.setItem('token', data.token || data.access_token);
        localStorage.setItem('user_email', data.email || data.user?.email || '');
        localStorage.setItem('user_name', data.name || data.user?.name || '');
        localStorage.setItem('token_stored_at', Date.now().toString());

        const nextUrl = new URLSearchParams(window.location.search).get('next');
        window.location.href = nextUrl ? decodeURIComponent(nextUrl) : 'main.html';
      } catch (err) {
        generalError.textContent = err.message;
        generalError.classList.add('visible');
      } finally {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    });

    // Clear field errors on input
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', () => {
        input.classList.remove('error');
        const errorEl = document.getElementById(input.id + 'Error');
        if (errorEl) errorEl.classList.remove('visible');
      });
    });
  </script>
</body>
</html>
