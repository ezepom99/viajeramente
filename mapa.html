<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mi Mapamundi · ViajeraMente</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; max-width: 100%; }

    :root {
      --accent: #0EA5E9;
      --accent-dark: #0284C7;
      --visited-fill: #0EA5E9;
      --visited-stroke: #0284C7;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e293b;
    }

    /* ── FULLSCREEN MAP ── */
    #map {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* ── FLOATING BACK BUTTON ── */
    #back-btn {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 500;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
      transition: background 0.2s;
    }
    #back-btn:hover { background: rgba(15, 23, 42, 0.95); }

    /* ── FLOATING STATS BADGE ── */
    #stats-badge {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 8px 18px;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
      pointer-events: none;
    }
    #stats-badge span { color: var(--accent); font-weight: 800; }

    /* ── FLOATING LAYERS PANEL ── */
    #layers-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 500;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.35);
      transition: background 0.2s;
    }
    #layers-btn:hover { background: rgba(15, 23, 42, 0.95); }

    #layers-panel {
      position: fixed;
      top: 64px;
      right: 16px;
      z-index: 500;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 12px 0;
      min-width: 180px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      transform-origin: top right;
      transform: scale(0.9);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1), opacity 0.15s;
    }
    #layers-panel.open {
      transform: scale(1);
      opacity: 1;
      pointer-events: all;
    }

    .layer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.12s, color 0.12s;
    }
    .layer-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .layer-item.active { color: var(--accent); }

    .layer-toggle {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 2px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .layer-item.active .layer-toggle {
      background: var(--accent);
      border-color: var(--accent);
    }
    .layer-toggle::after {
      content: '';
      display: none;
      width: 5px;
      height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }
    .layer-item.active .layer-toggle::after { display: block; }

    .layer-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 6px 0;
    }

    /* ── BOTTOM SHEET ── */
    #bottom-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 600;
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 0 0 max(24px, env(safe-area-inset-bottom));
      box-shadow: 0 -4px 30px rgba(0,0,0,0.2);
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0, 0.67, 0);
    }
    #bottom-sheet.open {
      transform: translateY(0);
      transition: transform 0.32s cubic-bezier(0.33, 1, 0.68, 1);
    }

    #sheet-handle-area {
      padding: 12px 20px 8px;
      cursor: pointer;
      text-align: center;
    }
    #sheet-handle {
      width: 36px;
      height: 4px;
      background: #CBD5E1;
      border-radius: 2px;
      margin: 0 auto;
    }

    #sheet-body {
      padding: 4px 20px 12px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #sheet-flag {
      font-size: 2.4rem;
      line-height: 1;
      flex-shrink: 0;
    }

    #sheet-info { flex: 1; min-width: 0; }
    #sheet-country-name {
      font-size: 1.15rem;
      font-weight: 800;
      color: #0F172A;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #sheet-country-sub {
      font-size: 0.8rem;
      color: #64748B;
    }

    #sheet-btn {
      flex-shrink: 0;
      padding: 11px 20px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    #sheet-btn:active { transform: scale(0.96); }
    #sheet-btn:hover { background: var(--accent-dark); }
    #sheet-btn.visited {
      background: #EFF6FF;
      color: var(--accent);
      border: 2px solid var(--accent);
    }
    #sheet-btn.visited:hover { background: #DBEAFE; }

    /* ── LOADING OVERLAY ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #0F172A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading-logo {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }
    #loading-text {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      margin-top: 16px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LEAFLET OVERRIDES ── */
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3) !important;
      border-radius: 12px !important;
      overflow: hidden;
    }
    .leaflet-control-zoom-in,
    .leaflet-control-zoom-out {
      background: rgba(15, 23, 42, 0.85) !important;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff !important;
      border: none !important;
      border-bottom: 1px solid rgba(255,255,255,0.08) !important;
      font-size: 1rem !important;
      font-weight: 400 !important;
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
    }
    .leaflet-control-zoom-in:hover,
    .leaflet-control-zoom-out:hover {
      background: rgba(15, 23, 42, 0.95) !important;
      color: var(--accent) !important;
    }
    .leaflet-bar a:last-child { border-bottom: none !important; }

    .leaflet-control-attribution {
      background: rgba(15,23,42,0.6) !important;
      color: rgba(255,255,255,0.5) !important;
      font-size: 0.65rem !important;
      border-radius: 6px 0 0 0 !important;
      padding: 2px 6px !important;
    }
    .leaflet-control-attribution a { color: rgba(255,255,255,0.5) !important; }

    .leaflet-popup-content-wrapper {
      border-radius: 14px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2) !important;
      border: none !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }

    .wonder-popup-inner {
      padding: 12px 16px;
      min-width: 160px;
    }
    .wonder-popup-inner strong { display: block; font-size: 0.9rem; color: #0F172A; margin-bottom: 2px; }
    .wonder-popup-inner span { font-size: 0.75rem; color: #64748B; }
    .wonder-visited-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      background: #D1FAE5;
      color: #065F46;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .wonder-marker {
      font-size: 1.4rem;
      line-height: 1;
      text-align: center;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35));
      cursor: pointer;
    }
    .wonder-marker.visited-wonder {
      filter: drop-shadow(0 2px 8px rgba(14,165,233,0.7));
    }

    /* Tooltip for city markers */
    .city-tooltip {
      background: rgba(15,23,42,0.88) !important;
      color: #fff !important;
      border: none !important;
      border-radius: 8px !important;
      padding: 4px 10px !important;
      font-size: 0.78rem !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3) !important;
    }
    .city-tooltip::before { display: none !important; }

    /* Landscape on mobile: nudge stats badge */
    @media (orientation: landscape) and (max-height: 500px) {
      #stats-badge { top: 8px; }
      #back-btn { top: 8px; left: 8px; }
      #layers-btn { top: 8px; right: 8px; }
      #layers-panel { top: 54px; right: 8px; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div id="loading-logo">🗺️</div>
  <div class="spinner"></div>
  <div id="loading-text">Cargando mapa...</div>
</div>

<!-- Fullscreen map -->
<div id="map"></div>

<!-- Floating back button -->
<a id="back-btn" href="profile.html" title="Volver al perfil" aria-label="Volver">←</a>

<!-- Fullscreen landscape button -->
<button id="landscape-btn" onclick="toggleLandscape()" title="Pantalla completa horizontal" style="
  position:fixed; top:16px; left:64px; z-index:500;
  width:40px; height:40px; border-radius:50%;
  background:rgba(15,23,42,0.85); backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.12); color:#fff;
  font-size:1.1rem; display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 2px 12px rgba(0,0,0,0.35);
  transition:background 0.2s;
">⛶</button>

<!-- Floating stats badge -->
<div id="stats-badge">
  Mis países visitados: <span id="stat-countries">0</span> &nbsp;·&nbsp; <span id="stat-continents">0</span> continentes
</div>

<!-- Floating layers toggle button -->
<button id="layers-btn" onclick="toggleLayersPanel()" title="Capas" aria-label="Capas">⊞</button>

<!-- Layers panel (dropdown) -->
<div id="layers-panel" role="menu">
  <div class="layer-item" id="layer-heatmap" onclick="toggleLayer('heatmap')">
    <span class="layer-toggle"></span>
    <span>🌡️ Heatmap</span>
  </div>
  <div class="layer-item" id="layer-maravillas_new" onclick="toggleLayer('maravillas_new')">
    <span class="layer-toggle"></span>
    🏛️ 7 Maravillas Modernas
  </div>
  <div class="layer-divider"></div>
  <div class="layer-item" id="layer-ciudades" onclick="toggleLayer('ciudades')">
    <span class="layer-toggle"></span>
    <span>🏙️ Ciudades</span>
  </div>
</div>

<!-- Bottom sheet -->
<div id="bottom-sheet" role="dialog" aria-modal="true" aria-label="Información del país">
  <div id="sheet-handle-area" onclick="closeSheet()">
    <div id="sheet-handle"></div>
  </div>
  <div id="sheet-body">
    <div id="sheet-flag">🌍</div>
    <div id="sheet-info">
      <div id="sheet-country-name">País</div>
      <div id="sheet-country-sub"></div>
    </div>
    <button id="sheet-btn" onclick="toggleCurrentCountry()">+ Marcar como visitado</button>
  </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// ── MAP INIT ──────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  initMap();
  // Close layers panel when clicking outside
  document.addEventListener('click', (e) => {
    if (layersPanelOpen &&
        !document.getElementById('layers-panel').contains(e.target) &&
        e.target.id !== 'layers-btn') {
      closeLayersPanel();
    }
  });
});

function initMap() {
  map = L.map('map', {
    zoomControl: false,
    attributionControl: true,
    minZoom: 2,
    maxZoom: 18,
    worldCopyJump: false,
  });

  // Esri World Topo Map — reliably shows English-language country names
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri',
    maxZoom: 19,
  }).addTo(map);

  // Zoom control — bottom right
  L.control.zoom({ position: 'bottomright' }).addTo(map);

  // Fit world
  map.setView([20, 0], 2);

  // Close sheet on map click
  map.on('click', () => closeSheet());

  loadGeoJSON();
  syncFromAPI();
}

// ── GEOJSON ───────────────────────────────────────────────────────────────────

async function loadGeoJSON() {
  try {
    setLoadingText('Cargando países...');
    const res = await fetch(GEOJSON_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const geojson = await res.json();

    geoLayer = L.geoJSON(geojson, {
      style: styleCountry,
      onEachFeature: (feature, layer) => {
        const iso = feature.properties.ISO_A2 || feature.properties.iso_a2 || '';
        if (iso) geoFeaturesMap[iso.toUpperCase()] = layer;

        layer.on('click', (e) => {
          L.DomEvent.stopPropagation(e);
          const code = iso.toUpperCase();
          const name = feature.properties.ADMIN || feature.properties.name || feature.properties.NAME || code;
          showCountrySheet(code, name);
        });

        layer.on('mouseover', function() {
          const code = iso.toUpperCase();
          if (!visitedCountries.has(code)) {
            this.setStyle({ fillColor: '#BAE6FD', fillOpacity: 0.45, weight: 1.5 });
          }
        });

        layer.on('mouseout', function() {
          geoLayer.resetStyle(this);
        });
      },
    }).addTo(map);

    updateStats();
    hideLoading();
  } catch (err) {
    console.error('Error loading GeoJSON:', err);
    setLoadingText('Error cargando mapa. Recarga la página.');
  }
}

// ── API SYNC ──────────────────────────────────────────────────────────────────

async function syncFromAPI() {
  const token = localStorage.getItem('token');
  if (!token) return;
  const API = 'https://eze.saypeter.com';
  try {
    // Sync countries
    const cr = await fetch(`${API}/api/visited-countries`, { headers: { Authorization: `Bearer ${token}` } });
    if (cr.ok) {
      const cd = await cr.json();
      if (cd.ok && cd.countries) {
        let changed = false;
        for (const c of cd.countries) {
          const iso = (c.country_code || '').toUpperCase();
          if (iso && !visitedCountries.has(iso)) { visitedCountries.add(iso); changed = true; }
        }
        if (changed) { saveCountries(); refreshGeoLayer(); updateStats(); }
      }
    }
    // Sync cities
    const vr = await fetch(`${API}/api/visited-cities`, { headers: { Authorization: `Bearer ${token}` } });
    if (vr.ok) {
      const vd = await vr.json();
      if (vd.ok && vd.cities) {
        let citiesChanged = false;
        for (const c of vd.cities) {
          const name = c.city_name;
          if (name && !visitedCities.some(v => v.toLowerCase() === name.toLowerCase())) {
            visitedCities.push(name); citiesChanged = true;
          }
        }
        if (citiesChanged) {
          localStorage.setItem('visitedCities', JSON.stringify(visitedCities));
          if (layers.ciudades) refreshCities();
        }
      }
    }
    // Refresh active layers after sync
    if (layers.heatmap) refreshHeatmap();
  } catch(e) { console.warn('API sync failed:', e); }
}

// ── COUNTRY STYLING ───────────────────────────────────────────────────────────

function styleCountry(feature) {
  const iso = (feature.properties.ISO_A2 || feature.properties.iso_a2 || '').toUpperCase();
  const visited = visitedCountries.has(iso);
  return {
    fillColor: visited ? '#0EA5E9' : 'transparent',
    fillOpacity: visited ? 0.55 : 0.01,
    color: visited ? '#0284C7' : 'rgba(100,116,139,0.2)',
    weight: visited ? 1.5 : 0.5,
    interactive: true,
  };
}

function refreshGeoLayer() {
  if (geoLayer) geoLayer.setStyle(styleCountry);
}

// ── BOTTOM SHEET ──────────────────────────────────────────────────────────────

function showCountrySheet(iso, name) {
  currentIso = iso;
  currentCountryName = name;

  const flag = isoToFlag(iso);
  const continent = ALPHA2_CONTINENT[iso] || '';

  document.getElementById('sheet-flag').textContent = flag;
  document.getElementById('sheet-country-name').textContent = name;
  document.getElementById('sheet-country-sub').textContent = continent ? `${continent} · ${iso}` : iso;

  updateSheetButton();
  document.getElementById('bottom-sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('bottom-sheet').classList.remove('open');
  currentIso = null;
}

function updateSheetButton() {
  const btn = document.getElementById('sheet-btn');
  if (visitedCountries.has(currentIso)) {
    btn.textContent = '✓ Quitar de visitados';
    btn.classList.add('visited');
  } else {
    btn.textContent = '+ Marcar como visitado';
    btn.classList.remove('visited');
  }
}

function toggleCurrentCountry() {
  if (!currentIso) return;
  if (visitedCountries.has(currentIso)) {
    visitedCountries.delete(currentIso);
  } else {
    visitedCountries.add(currentIso);
  }
  saveCountries();
  refreshGeoLayer();
  updateStats();
  refreshHeatmap();
  updateSheetButton();
}

// ── STATS ─────────────────────────────────────────────────────────────────────

function updateStats() {
  document.getElementById('stat-countries').textContent = visitedCountries.size;
  const continents = new Set(
    [...visitedCountries].map(c => ALPHA2_CONTINENT[c]).filter(Boolean)
  );
  document.getElementById('stat-continents').textContent = continents.size;
}

// ── LAYERS PANEL ──────────────────────────────────────────────────────────────

function toggleLayersPanel() {
  layersPanelOpen = !layersPanelOpen;
  document.getElementById('layers-panel').classList.toggle('open', layersPanelOpen);
}

function closeLayersPanel() {
  layersPanelOpen = false;
  document.getElementById('layers-panel').classList.remove('open');
}

function toggleLayer(name) {
  layers[name] = !layers[name];
  document.getElementById('layer-' + name).classList.toggle('active', layers[name]);

  if (name === 'heatmap')         refreshHeatmap();
  if (name === 'maravillas_new')  refreshWonders();
  if (name === 'ciudades')        refreshCities();
}

// ── HEATMAP ───────────────────────────────────────────────────────────────────

function refreshHeatmap() {
  if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
  if (!layers.heatmap) return;

  // Build city count per country from visitedCities (array of city name strings)
  // visitedCities in profile.html are stored as plain city names, not country-tagged
  // We weight by visited-cities that partially match country name as fallback
  // Main intensity = 1.0 per visited country, boosted by city count if available
  const cityCountByCountry = {};
  // visitedCities is a flat array of city name strings — we can't map them to countries
  // without additional data, so we use uniform weight 1.0 base + bonus for multi-city

  const points = [];
  for (const iso of visitedCountries) {
    const c = COUNTRY_CENTROIDS[iso];
    if (!c) continue;
    // Intensity: base 0.6, boosted if user has cities in that country
    const intensity = 0.6 + Math.min((cityCountByCountry[iso] || 0) * 0.2, 0.4);
    points.push([c[0], c[1], intensity]);
  }

  if (points.length === 0) return;

  heatLayer = L.heatLayer(points, {
    radius: 80,
    blur: 55,
    maxZoom: 8,
    max: 1.0,
    minOpacity: 0.4,
    gradient: {
      0.0: '#0EA5E9',
      0.4: '#6366F1',
      0.7: '#8B5CF6',
      1.0: '#DB2777',
    },
  }).addTo(map);
}

// ── WONDERS ───────────────────────────────────────────────────────────────────

function refreshWonders() {
  if (wonderLayer) { map.removeLayer(wonderLayer); wonderLayer = null; }
  if (!layers.maravillas_new) return;

  wonderLayer = L.layerGroup().addTo(map);

  const toShow = [];
  if (layers.maravillas_new) toShow.push(...WONDERS_NEW);

  toShow.forEach(w => {
    const isVisited = visitedWonders.has(w.id);
    const icon = L.divIcon({
      html: `<div class="wonder-marker${isVisited ? ' visited-wonder' : ''}">${w.emoji}</div>`,
      className: '',
      iconSize: [30, 30],
      iconAnchor: [15, 15],
    });
    const marker = L.marker([w.lat, w.lng], { icon });
    marker.bindPopup(`<div class="wonder-popup-inner">
      <strong>${w.emoji} ${w.name}</strong>
      <span>${w.type}</span>
      ${isVisited ? '<div class="wonder-visited-badge">✓ Visitada</div>' : ''}
    </div>`, { maxWidth: 220, offset: [0, -6] });
    marker.addTo(wonderLayer);
  });
}

  localStorage.setItem('visitedCountries', JSON.stringify([...visitedCountries]));
}

// ── FLAG EMOJI ────────────────────────────────────────────────────────────────

function isoToFlag(iso2) {
  if (!iso2 || iso2.length !== 2) return '🌍';
  const codePoints = [...iso2.toUpperCase()].map(c => 0x1F1E0 + c.charCodeAt(0) - 65);
  return String.fromCodePoint(...codePoints);
}

// ── LOADING ───────────────────────────────────────────────────────────────────

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('hidden');
  setTimeout(() => { el.style.display = 'none'; }, 500);
}

function setLoadingText(text) {
  const el = document.getElementById('loading-text');
  if (el) el.textContent = text;
}

// ── FULLSCREEN / LANDSCAPE ─────────────────────────────────────────────────

let isFullscreen = false;
async function toggleLandscape() {
  try {
    if (!isFullscreen) {
      await document.documentElement.requestFullscreen();
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock('landscape');
      }
      isFullscreen = true;
      document.getElementById('landscape-btn').innerHTML = '✕';
    } else {
      if (document.exitFullscreen) await document.exitFullscreen();
      if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
      isFullscreen = false;
      document.getElementById('landscape-btn').innerHTML = '⛶';
    }
    setTimeout(() => map.invalidateSize(), 300);
  } catch(e) { console.warn('Fullscreen/orientation not supported:', e); }
}

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    isFullscreen = false;
    document.getElementById('landscape-btn').innerHTML = '⛶';
  }
});

</script>
