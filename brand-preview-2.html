<html lang="es">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Blue-green-lila palette (vivid version of #13 style) */
      --sky: #0EA5E9;
      --teal: #0D9488;
      --mint: #34D399;
      --lila: #A78BFA;
      --violet: #7C3AED;
      --indigo: #4F46E5;
      --rose: #F472B6;
      --white: #FFFFFF;
      --dark: #0F172A;
      --mid: #334155;
      --soft: #94A3B8;
      /* Gradients */
      --grad-main: linear-gradient(135deg, #0EA5E9 0%, #0D9488 50%, #A78BFA 100%);
      --grad-vivid: linear-gradient(120deg, #06B6D4 0%, #8B5CF6 100%);
      --grad-warm: linear-gradient(135deg, #34D399 0%, #0EA5E9 50%, #A78BFA 100%);
      --bg: #F0F9FF;
      --card: #FFFFFF;
      --border: #E0F2FE;
      --text: #0F172A;
      --subtext: #64748B;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--dark);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
    }

    header h1 span {
      background: var(--grad-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 0.75rem;
      opacity: 0.45;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .note {
      background: linear-gradient(90deg, #EFF6FF, #F5F3FF);
      border-left: 3px solid #7C3AED;
      padding: 14px 24px;
      font-size: 0.82rem;
      color: #4338CA;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .filters {
      display: flex;
      gap: 8px;
      padding: 20px 32px;
      flex-wrap: wrap;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .filter-btn {
      padding: 7px 16px;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--subtext);
    }

    .filter-btn:hover { border-color: var(--indigo); color: var(--indigo); }
    .filter-btn.active { background: var(--indigo); color: white; border-color: var(--indigo); }

    .section-title {
      padding: 28px 32px 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--soft);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      padding: 12px 32px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 760px)  { .grid { grid-template-columns: repeat(2, 1fr); padding: 16px; } }
    @media (max-width: 420px)  { .grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 12px 40px rgba(79,70,229,0.12);
    }

    .card:hover .copy-btn { opacity: 1; }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      min-height: 180px;
    }

    .card-info {
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
    }

    .card-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--subtext);
      line-height: 1.4;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 100px;
      margin-bottom: 6px;
    }

    .tag-icon      { background: #EEF2FF; color: #4338CA; }
    .tag-wordmark  { background: #F0FDFA; color: #0F766E; }
    .tag-circle    { background: #FAF5FF; color: #7C3AED; }
    .tag-square    { background: #FFF7ED; color: #B45309; }
    .tag-gradient  { background: #ECFDF5; color: #065F46; }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .copy-btn:hover { background: var(--indigo); color: white; border-color: var(--indigo); }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 20px;
      max-width: 600px;
      width: 90%;
      overflow: hidden;
      position: relative;
    }

    .modal-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      min-height: 320px;
    }

    .modal-logo svg { max-width: 380px; max-height: 260px; }

    .modal-info {
      padding: 20px 28px 28px;
      border-top: 1px solid var(--border);
    }

    .modal-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .modal-desc {
      font-size: 0.9rem;
      color: var(--subtext);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .modal-copy-btn {
      padding: 9px 18px;
      background: var(--indigo);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: white;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--subtext);
    }

    .modal-close:hover { background: var(--dark); color: white; }

    .concept-num {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--subtext);
      opacity: 0.5;
    }

    .hidden { display: none !important; }
  </style>
</head>

<header>

const tagMap = {
  wordmark: { label: 'Wordmark', cls: 'tag-wordmark' },
  icon:     { label: 'Icono',    cls: 'tag-icon' },
  circle:   { label: 'Circular', cls: 'tag-circle' },
  square:   { label: 'Cuadrado', cls: 'tag-square' },
  gradient: { label: 'Gradiente',cls: 'tag-gradient' },
};

function renderGrid(filter = 'all') {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  concepts.forEach(c => {
    if (filter !== 'all' && c.cat !== filter) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = c.id;
    const tag = tagMap[c.cat];
    card.innerHTML = `
      <span class="concept-num">#${c.id}</span>
      <button class="copy-btn" data-id="${c.id}">Copiar SVG</button>
      <div class="logo-area" style="background:${c.bg}">${c.svg}</div>
      <div class="card-info">
        <div class="card-tag ${tag.cls}">${tag.label}</div>
        <div class="card-name">${c.name}</div>
        <div class="card-desc">${c.desc}</div>
      </div>
    `;
    card.addEventListener('click', (e) => {
      if (e.target.classList.contains('copy-btn')) return;
      openModal(c);
    });
    card.querySelector('.copy-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      copySVG(c);
    });
    grid.appendChild(card);
  });
}

function openModal(c) {
  const tag = tagMap[c.cat];
  document.getElementById('modal-logo').style.background = c.bg;
  document.getElementById('modal-logo').innerHTML = c.svg;
  document.getElementById('modal-name').innerHTML = `<span class="card-tag ${tag.cls}" style="margin-right:8px">${tag.label}</span>${c.name}`;
  document.getElementById('modal-desc').textContent = c.desc;
  document.getElementById('modal-copy').onclick = () => copySVG(c);
  document.getElementById('modal').classList.add('open');
}

function copySVG(c) {
  navigator.clipboard.writeText(c.svg).then(() => {
    const btn = document.querySelector(`[data-id="${c.id}"].copy-btn`) || document.getElementById('modal-copy');
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = orig, 1800);
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(btn.dataset.filter);
  });
});

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('open');
});
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') document.getElementById('modal').classList.remove('open');
});

renderGrid();
</script>
