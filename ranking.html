    .nav {

    @media (max-width: 480px) {

<script>
const API_BASE = 'https://eze.saypeter.com';
let currentMetric = 'countries';
let currentData = [];

// Check if logged in
const token = localStorage.getItem('token');
const myUsername = localStorage.getItem('user_name') || localStorage.getItem('username') || '';

// Update nav
if (token) {
  // nav.js handles auth state
} else {
  document.getElementById('loginCta').style.display = 'flex';
}

// ── METRIC CONFIG ──
const METRICS = {
  countries:  { label:'Países visitados',  unit:'país',   units:'países',    suffix: n => n === 1 ? '1 país' : `${n} países` },
  km:         { label:'Kilómetros',        unit:'km',     units:'km',        suffix: n => n >= 1000 ? `${Math.round(n/1000)}k km` : `${n} km` },
  wonders:    { label:'Maravillas',        unit:'marav.', units:'maravillas', suffix: n => `${n} marav.` },
  continents: { label:'Continentes',       unit:'cont.',  units:'continentes', suffix: n => `${n} cont.` },
  cities:     { label:'Ciudades visitadas',unit:'ciudad', units:'ciudades',  suffix: n => n === 1 ? '1 ciudad' : `${n} ciudades` },
};

// ── AVATAR COLOR ──
const COLORS = ['#0EA5E9','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#06B6D4','#84CC16'];
function avatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return COLORS[Math.abs(h) % COLORS.length];
}

// ── LEVEL FROM KM ──
function getLevel(km) {
  if (km >= 100000) return { name:'Ciudadano del mundo', emoji:'🌌', cls:'sapphire' };
  if (km >= 50000)  return { name:'Nómada global',       emoji:'🚀', cls:'diamond'  };
  if (km >= 30000)  return { name:'Viajero empedernido', emoji:'✈️', cls:'gold'     };
  if (km >= 15000)  return { name:'Mochilero',           emoji:'🗺️', cls:'silver'   };
  if (km >= 5000)   return { name:'Explorador',          emoji:'🌍', cls:'bronze'   };
  if (km >= 1000)   return { name:'Pollito viajero',     emoji:'🐣', cls:'bronze'   };
  return                   { name:'Huevo',               emoji:'🥚', cls:'bronze'   };
}

// ── SWITCH TAB ──
function switchTab(btn, metric) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMetric = metric;
  loadLeaderboard(metric);
}

// ── LOAD LEADERBOARD ──
async function loadLeaderboard(metric = 'countries') {
  // Show skeletons
  document.getElementById('lbSkeletons').style.display = 'block';
  document.getElementById('lbList').style.display = 'none';
  document.getElementById('lbEmpty').style.display = 'none';
  document.getElementById('podiumSection').style.display = 'none';

  try {
    const res = await fetch(`${API_BASE}/api/leaderboard?metric=${metric}&limit=20`);
    const data = await res.json();
    const list = data.leaderboard || [];
    currentData = list;
    renderLeaderboard(list, metric);
  } catch (err) {
    console.error('Leaderboard error:', err);
    // Show empty with error
    document.getElementById('lbSkeletons').style.display = 'none';
    document.getElementById('lbEmpty').style.display = 'block';
    document.getElementById('lbEmpty').innerHTML = `
      <div class="list-placeholder">
        <div class="pl-icon">⚠️</div>
        <p>No se pudo cargar el ranking. Intenta de nuevo.</p>
      </div>`;
  }
}

// ── RENDER LEADERBOARD ──
function renderLeaderboard(list, metric) {
  document.getElementById('lbSkeletons').style.display = 'none';

  if (!list || list.length === 0) {
    document.getElementById('lbEmpty').style.display = 'block';
    return;
  }

  const cfg = METRICS[metric] || METRICS.countries;

  // TOP 3 PODIUM
  const top3 = list.slice(0, 3);
  if (top3.length >= 1) {
    document.getElementById('podiumSection').style.display = 'block';
    renderPodium(top3, cfg);
  }

  // LIST (positions 4+)
  const rest = list.slice(3);
  document.getElementById('lbList').style.display = 'block';

  if (rest.length === 0) {
    document.getElementById('lbList').innerHTML = '<div style="padding:16px 20px; text-align:center; color:var(--text-3); font-size:.85rem;">Solo hay 3 viajeros en este ranking por ahora.</div>';
    return;
  }

  document.getElementById('lbList').innerHTML = rest.map((user, i) => {
    const pos = i + 4;
    const color = avatarColor(user.name || user.username || '?');
    const initial = (user.name || user.username || '?').charAt(0).toUpperCase();
    const userKm = user.total_km || user.km || 0;
    const level = getLevel(userKm);
    const isMe = myUsername && (user.username === myUsername);
    const value = cfg.suffix(user.value || user[metric] || 0);

    return `<a class="lb-item ${isMe ? 'is-me' : ''}" href="perfil-publico.html?user=${encodeURIComponent(user.username || '')}">
      <div class="lb-pos">${pos}</div>
      <div class="lb-avatar" style="background:${color};">${initial}</div>
      <div class="lb-info">
        <div class="lb-name">${user.name || user.username || 'Viajero'}</div>
        <div class="lb-handle">@${user.username || ''}</div>
      </div>
      <div class="lb-right">
        <div class="lb-value">${value}</div>
        <span class="lb-level ${level.cls}">${level.name}</span>
      </div>
    </a>`;
  }).join('');

  // My position
  findMyPosition(list, cfg, metric);
}

// ── RENDER PODIUM ──
function renderPodium(top3, cfg) {
  // Reorder: 2nd, 1st, 3rd for visual podium layout
  const order = top3.length >= 3
    ? [top3[1], top3[0], top3[2]]
    : top3.length === 2
    ? [top3[1], top3[0]]
    : [top3[0]];

  const positions = top3.length >= 3 ? ['second','first','third'] : top3.length === 2 ? ['second','first'] : ['first'];
  const crowns = { first:'🥇', second:'🥈', third:'🥉' };

  document.getElementById('podium').innerHTML = order.map((user, idx) => {
    const cls = positions[idx];
    const color = avatarColor(user.name || user.username || '?');
    const initial = (user.name || user.username || '?').charAt(0).toUpperCase();
    const value = cfg.suffix(user.value || user[currentMetric] || 0);
    const isMe = myUsername && (user.username === myUsername);

    return `<div class="podium-item ${cls} ${isMe ? 'is-me' : ''}" onclick="window.location='perfil-publico.html?user=${encodeURIComponent(user.username || '')}'">
      <div class="podium-crown">${crowns[cls]}</div>
      <div class="podium-avatar" style="${cls !== 'first' ? `background:inherit;` : ''}">${initial}</div>
      <div class="podium-name">${user.name || user.username || 'Viajero'}</div>
      <div class="podium-username">@${user.username || ''}</div>
      <div class="podium-value">${value}</div>
      <div class="podium-block">${cls === 'first' ? '1' : cls === 'second' ? '2' : '3'}</div>
    </div>`;
  }).join('');
}

// ── MY POSITION ──
function findMyPosition(list, cfg, metric) {
  if (!token || !myUsername) return;

  const idx = list.findIndex(u => u.username === myUsername);
  if (idx >= 0) {
    const user = list[idx];
    const pos = idx + 1;
    const value = cfg.suffix(user.value || user[metric] || 0);
    document.getElementById('myRank').innerHTML = `#${pos} <span>/ ${list.length}</span>`;
    document.getElementById('myPositionName').textContent = user.name || user.username || 'Tú';
    document.getElementById('myPositionSub').textContent = value + ' · ' + cfg.label;
    document.getElementById('myPositionCard').style.display = 'flex';
    document.getElementById('loginCta').style.display = 'none';
  } else if (token) {
    // Logged in but not in top 20
    document.getElementById('myRank').innerHTML = `>${list.length}`;
    document.getElementById('myPositionName').textContent = myUsername;
    document.getElementById('myPositionSub').textContent = 'Fuera del top ' + list.length;
    document.getElementById('myPositionCard').style.display = 'flex';
    document.getElementById('loginCta').style.display = 'none';
  }
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
loadLeaderboard('countries');
</script>
