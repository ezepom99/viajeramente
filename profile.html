<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil — ViajeraMente</title>
  <meta name="description" content="Tu perfil de viajero en ViajeraMente. Mapa mundial, conexiones y estilo de viaje.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T1HJ3PJWYN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T1HJ3PJWYN');
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #E85D2A;
      --accent-light: #FF7A47;
      --accent-dark: #C74A1E;
      --accent-glow: rgba(232, 93, 42, 0.15);
      --teal: #1A8C7E;
      --teal-light: #22B8A6;
      --teal-dark: #136B60;
      --teal-glow: rgba(26, 140, 126, 0.15);
      --gold: #F5A623;
      --purple: #8B5CF6;
      --dark: #0B0D0F;
      --gray-900: #151820;
      --gray-800: #1E2330;
      --gray-700: #2A3040;
      --gray-600: #6B7280;
      --gray-500: #9CA3AF;
      --gray-400: #B0B8C4;
      --gray-300: #D1D5DB;
      --gray-200: #E5E7EB;
      --gray-100: #F3F4F6;
      --gray-50: #F9FAFB;
      --white: #FFFFFF;
      --sand: #FAF8F5;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--white);
      background: var(--dark);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      min-height: 100vh;
    }

    h1, h2, h3, h4 { font-family: 'Space Grotesk', sans-serif; }

    /* ── Animations ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .6; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .animate-in { animation: fadeInUp .6s ease both; }
    .animate-in-d1 { animation: fadeInUp .6s ease .1s both; }
    .animate-in-d2 { animation: fadeInUp .6s ease .2s both; }
    .animate-in-d3 { animation: fadeInUp .6s ease .3s both; }
    .animate-in-d4 { animation: fadeInUp .6s ease .4s both; }

    /* ── Background ── */
    .page-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 0%, rgba(232, 93, 42, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(26, 140, 126, 0.06) 0%, transparent 60%),
        linear-gradient(180deg, var(--dark) 0%, var(--gray-900) 100%);
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(11, 13, 15, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      animation: slideDown .5s ease;
    }

    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--white);
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--accent); }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-user-name {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray-300);
    }
    .nav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      color: var(--white);
      flex-shrink: 0;
    }

    .nav-logout {
      font-size: 0.8rem;
      color: var(--gray-500);
      text-decoration: none;
      cursor: pointer;
      transition: color .2s;
      border: none;
      background: none;
      font-family: inherit;
    }
    .nav-logout:hover { color: var(--accent); }

    /* ── Main ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 88px 20px 60px;
      width: 100%;
    }

    /* ── Section Titles ── */
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title .icon {
      font-size: 1.2rem;
    }

    /* ── Glass Card ── */
    .glass-card {
      background: rgba(30, 35, 48, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
      transition: border-color .3s;
    }
    .glass-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
    }

    /* ── Profile Header ── */
    .profile-header {
      display: flex;
      align-items: flex-start;
      gap: 28px;
      flex-wrap: wrap;
    }

    .avatar-large {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 2.4rem;
      color: var(--white);
      flex-shrink: 0;
      box-shadow: 0 0 0 4px rgba(232, 93, 42, 0.2), 0 8px 32px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .profile-info { flex: 1; min-width: 200px; }
    .profile-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 2px;
    }
    .profile-username {
      font-size: 0.9rem;
      color: var(--gray-500);
      margin-bottom: 10px;
    }
    .profile-bio {
      font-size: 0.95rem;
      color: var(--gray-400);
      line-height: 1.6;
      margin-bottom: 14px;
      max-width: 500px;
    }
    .profile-bio-empty {
      font-style: italic;
      color: var(--gray-600);
    }

    .profile-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--gray-400);
    }
    .badge .b-icon { font-size: 0.75rem; }

    .btn-edit-profile {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      background: rgba(232, 93, 42, 0.12);
      color: var(--accent-light);
      border: 1px solid rgba(232, 93, 42, 0.25);
      cursor: pointer;
      transition: all .25s;
      font-family: inherit;
    }
    .btn-edit-profile:hover {
      background: rgba(232, 93, 42, 0.2);
      border-color: rgba(232, 93, 42, 0.4);
      transform: translateY(-1px);
    }

    /* ── Stats Cards ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(30, 35, 48, 0.45);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: all .3s;
    }
    .stat-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
    }
    .stat-icon {
      font-size: 1.5rem;
      margin-bottom: 8px;
      display: block;
    }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label {
      font-size: 0.78rem;
      color: var(--gray-500);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── World Map ── */
    .map-container {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(11, 13, 15, 0.4);
      padding: 10px;
      margin-bottom: 16px;
    }
    .map-container svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .map-container svg path {
      fill: var(--gray-800);
      stroke: var(--gray-700);
      stroke-width: 0.5;
      transition: fill .3s, opacity .3s;
      cursor: pointer;
    }
    .map-container svg path:hover {
      opacity: 0.85;
    }
    .map-container svg path.visited {
      fill: var(--accent);
      stroke: var(--accent-dark);
    }
    .map-container svg path.visited:hover {
      fill: var(--accent-light);
    }

    .map-tooltip {
      position: absolute;
      background: var(--gray-900);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.8rem;
      color: var(--white);
      pointer-events: none;
      z-index: 10;
      opacity: 0;
      transition: opacity .15s;
      white-space: nowrap;
    }

    .country-search-container {
      position: relative;
      max-width: 400px;
      margin-bottom: 14px;
    }
    .country-search {
      width: 100%;
      padding: 10px 14px 10px 36px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--white);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    .country-search:focus {
      border-color: var(--accent);
    }
    .country-search::placeholder { color: var(--gray-600); }
    .country-search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gray-600);
      font-size: 0.9rem;
      pointer-events: none;
    }
    .country-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      max-height: 220px;
      overflow-y: auto;
      background: var(--gray-900);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      margin-top: 4px;
      z-index: 20;
      display: none;
    }
    .country-dropdown.open { display: block; }
    .country-option {
      padding: 10px 14px;
      font-size: 0.85rem;
      color: var(--gray-300);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background .15s;
    }
    .country-option:hover {
      background: rgba(232, 93, 42, 0.1);
      color: var(--white);
    }
    .country-option .flag { font-size: 1.1rem; }

    .visited-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .visited-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      background: rgba(232, 93, 42, 0.12);
      color: var(--accent-light);
      border: 1px solid rgba(232, 93, 42, 0.2);
    }
    .visited-tag .remove-country {
      cursor: pointer;
      opacity: 0.6;
      transition: opacity .2s;
      font-size: 0.75rem;
    }
    .visited-tag .remove-country:hover { opacity: 1; }

    /* ── Connections Grid ── */
    .connections-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .connection-card {
      background: rgba(30, 35, 48, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 20px;
      transition: all .3s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .connection-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }
    .connection-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .connection-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.06);
    }
    .connection-info h4 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 2px;
    }
    .connection-info p {
      font-size: 0.78rem;
      color: var(--gray-500);
      line-height: 1.4;
    }
    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
    }
    .connection-status .connected-user {
      font-size: 0.82rem;
      color: var(--teal-light);
      font-weight: 500;
      flex: 1;
    }
    .btn-connect {
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .25s;
      border: none;
      font-family: inherit;
    }
    .btn-connect-primary {
      background: var(--accent);
      color: var(--white);
    }
    .btn-connect-primary:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
    }
    .btn-connect-secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--gray-400);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .btn-connect-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--white);
    }
    .btn-connect-danger {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 5px 12px;
      font-size: 0.75rem;
    }
    .btn-connect-danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }
    .btn-connect-link {
      background: none;
      color: var(--teal-light);
      padding: 5px 10px;
      font-size: 0.75rem;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .btn-connect-link:hover { color: var(--teal); }

    /* ── Travel Style Chips ── */
    .chips-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .chip {
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .25s;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--gray-400);
      user-select: none;
    }
    .chip:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--white);
    }
    .chip.selected {
      background: rgba(232, 93, 42, 0.15);
      border-color: rgba(232, 93, 42, 0.35);
      color: var(--accent-light);
    }
    .chip-teal.selected {
      background: rgba(26, 140, 126, 0.15);
      border-color: rgba(26, 140, 126, 0.35);
      color: var(--teal-light);
    }
    .chip-purple.selected {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.35);
      color: #a78bfa;
    }
    .chip-gold.selected {
      background: rgba(245, 166, 35, 0.15);
      border-color: rgba(245, 166, 35, 0.35);
      color: var(--gold);
    }

    .subsection-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gray-400);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .subsection { margin-bottom: 24px; }
    .subsection:last-child { margin-bottom: 0; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: all .3s;
    }
    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: var(--gray-900);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 32px;
      max-width: 520px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      transform: scale(0.95) translateY(10px);
      transition: transform .3s;
    }
    .modal-overlay.open .modal {
      transform: scale(1) translateY(0);
    }
    .modal h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--white);
    }
    .modal-field {
      margin-bottom: 16px;
    }
    .modal-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray-400);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .modal-field input,
    .modal-field textarea,
    .modal-field select {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--white);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s;
    }
    .modal-field input:focus,
    .modal-field textarea:focus,
    .modal-field select:focus {
      border-color: var(--accent);
    }
    .modal-field textarea {
      resize: vertical;
      min-height: 80px;
    }
    .modal-field input::placeholder,
    .modal-field textarea::placeholder {
      color: var(--gray-600);
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .btn-modal {
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all .25s;
    }
    .btn-modal-primary {
      background: var(--accent);
      color: var(--white);
    }
    .btn-modal-primary:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
    }
    .btn-modal-cancel {
      background: rgba(255, 255, 255, 0.06);
      color: var(--gray-400);
    }
    .btn-modal-cancel:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--white);
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--gray-900);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.85rem;
      color: var(--gray-300);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      animation: fadeInUp .3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast-success { border-color: rgba(26, 140, 126, 0.3); }
    .toast-success::before { content: '\2713'; color: var(--teal-light); font-weight: 700; }
    .toast-error { border-color: rgba(239, 68, 68, 0.3); }
    .toast-error::before { content: '\2717'; color: #f87171; font-weight: 700; }

    /* ── Loading ── */
    .loading-skeleton {
      background: linear-gradient(90deg, var(--gray-800) 25%, var(--gray-700) 50%, var(--gray-800) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--gray-700);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--gray-600); }

// ── Render ──

// ── Avatar gradient from name ──
function nameToGradient(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  const gradients = [
    'linear-gradient(135deg, #E85D2A, #FF7A47)',
    'linear-gradient(135deg, #1A8C7E, #22B8A6)',
    'linear-gradient(135deg, #8B5CF6, #A78BFA)',
    'linear-gradient(135deg, #F5A623, #FBBF24)',
    'linear-gradient(135deg, #E85D2A, #8B5CF6)',
    'linear-gradient(135deg, #1A8C7E, #F5A623)',
    'linear-gradient(135deg, #C74A1E, #1A8C7E)',
    'linear-gradient(135deg, #8B5CF6, #22B8A6)'
  ];
  return gradients[Math.abs(hash) % gradients.length];
}

// ── Map ──
function renderMap(visitedCodes) {
  const svg = document.getElementById('worldMap');
  const tooltip = document.getElementById('mapTooltip');

  // Highlight visited countries
  visitedCodes.forEach(code => {
    const path = svg.getElementById(code);
    if (path) path.classList.add('visited');
  });

  // Tooltip
  svg.querySelectorAll('path').forEach(path => {
    path.addEventListener('mouseenter', (e) => {
      const name = path.getAttribute('data-name') || path.id;
      tooltip.textContent = name;
      tooltip.style.opacity = '1';
    });
    path.addEventListener('mousemove', (e) => {
      const rect = document.getElementById('mapContainer').getBoundingClientRect();
      tooltip.style.left = (e.clientX - rect.left + 10) + 'px';
      tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
    });
    path.addEventListener('mouseleave', () => {
      tooltip.style.opacity = '0';
    });
  });

  // Render tags
  renderVisitedTags(visitedCodes);
}

function renderVisitedTags(codes) {
  const container = document.getElementById('visitedTags');
  container.innerHTML = '';
  (codes || []).forEach(code => {
    const c = COUNTRIES[code];
    if (!c) return;
    const tag = document.createElement('span');
    tag.className = 'visited-tag';
    tag.innerHTML = `${c.flag} ${c.name} <span class="remove-country" onclick="removeCountry('${code}')">&times;</span>`;
    container.appendChild(tag);
  });
}

// ── Country Search ──
const countrySearch = document.getElementById('countrySearch');
const countryDropdown = document.getElementById('countryDropdown');

countrySearch.addEventListener('input', () => {
  const q = countrySearch.value.toLowerCase().trim();
  if (!q) {
    countryDropdown.classList.remove('open');
    return;
  }
  const visited = userData.countries_visited || [];
  const results = Object.entries(COUNTRIES)
    .filter(([code, c]) => !visited.includes(code) && (c.name.toLowerCase().includes(q) || code.toLowerCase().includes(q)))
    .slice(0, 8);

  if (results.length === 0) {
    countryDropdown.classList.remove('open');
    return;
  }

  countryDropdown.innerHTML = results.map(([code, c]) =>
    `<div class="country-option" onclick="addCountry('${code}')">
      <span class="flag">${c.flag}</span> ${c.name}
    </div>`
  ).join('');
  countryDropdown.classList.add('open');
});

countrySearch.addEventListener('blur', () => {
  setTimeout(() => countryDropdown.classList.remove('open'), 200);
});

async function addCountry(code) {
  if (!userData.countries_visited) userData.countries_visited = [];
  if (userData.countries_visited.includes(code)) return;

  userData.countries_visited.push(code);
  countrySearch.value = '';
  countryDropdown.classList.remove('open');

  // Update map
  const path = document.getElementById(code);
  if (path) path.classList.add('visited');
  renderVisitedTags(userData.countries_visited);
  document.getElementById('statCountries').textContent = userData.countries_visited.length;

  await saveUserData({ countries_visited: userData.countries_visited });
  showToast(`${COUNTRIES[code]?.name || code} añadido a tu mapa`, 'success');
}

async function removeCountry(code) {
  if (!userData.countries_visited) return;
  userData.countries_visited = userData.countries_visited.filter(c => c !== code);

  const path = document.getElementById(code);
  if (path) path.classList.remove('visited');
  renderVisitedTags(userData.countries_visited);
  document.getElementById('statCountries').textContent = userData.countries_visited.length;

  await saveUserData({ countries_visited: userData.countries_visited });
  showToast(`${COUNTRIES[code]?.name || code} eliminado`, 'success');
}

// ── Connections ──
function renderConnections(connections) {
  const grid = document.getElementById('connectionsGrid');
  grid.innerHTML = '';

  SERVICES.forEach(service => {
    const conn = connections?.[service.id];
    const isConnected = conn && conn.username;

    const card = document.createElement('div');
    card.className = 'connection-card';
    card.innerHTML = `
      <div class="connection-card-header">
        <div class="connection-icon">${service.icon}</div>
        <div class="connection-info">
          <h4>${service.name}</h4>
          <p>${service.desc}</p>
        </div>
      </div>
      <div class="connection-status">
        ${isConnected ? `
          <span class="connected-user">@${conn.username}</span>
          <button class="btn-connect btn-connect-link" onclick="window.open('${conn.url || 'https://' + service.domain}', '_blank')">Ver perfil</button>
          <button class="btn-connect btn-connect-danger" onclick="disconnectService('${service.id}')">Desconectar</button>
        ` : `
          <button class="btn-connect btn-connect-primary" onclick="openConnectionModal('${service.id}')">Conectar</button>
        `}
      </div>
    `;
    grid.appendChild(card);
  });
}

function openConnectionModal(serviceId) {
  currentConnectionService = serviceId;
  const service = SERVICES.find(s => s.id === serviceId);
  document.getElementById('connectionModalTitle').textContent = `Conectar ${service.name}`;
  document.getElementById('connectionUsername').value = '';
  document.getElementById('connectionUrl').value = '';
  document.getElementById('connectionUrl').placeholder = `https://${service.domain}/tu_usuario`;
  document.getElementById('connectionModal').classList.add('open');
}

function closeConnectionModal() {
  document.getElementById('connectionModal').classList.remove('open');
  currentConnectionService = null;
}

async function saveConnection() {
  if (!currentConnectionService) return;
  const username = document.getElementById('connectionUsername').value.trim();
  const url = document.getElementById('connectionUrl').value.trim();

  if (!username) {
    showToast('Introduce tu nombre de usuario', 'error');
    return;
  }

  if (!userData.connections) userData.connections = {};
  userData.connections[currentConnectionService] = { username, url };

  await saveUserData({ connections: userData.connections });
  renderConnections(userData.connections);
  updateConnectionStats();
  closeConnectionModal();

  const service = SERVICES.find(s => s.id === currentConnectionService);
  showToast(`${service.name} conectado`, 'success');
}

async function disconnectService(serviceId) {
  if (!userData.connections) return;
  delete userData.connections[serviceId];

  await saveUserData({ connections: userData.connections });
  renderConnections(userData.connections);
  updateConnectionStats();

  const service = SERVICES.find(s => s.id === serviceId);
  showToast(`${service.name} desconectado`, 'success');
}

function updateConnectionStats() {
  const connections = userData.connections || {};
  const count = Object.values(connections).filter(c => c && c.username).length;
  document.getElementById('statConnections').textContent = count;
}

// ── Travel Style Chips ──
function renderTravelStyles() {
  const container = document.getElementById('styleChips');
  container.innerHTML = '';
  const selected = userData.travel_styles || [];

  TRAVEL_STYLES.forEach(style => {
    const chip = document.createElement('span');
    chip.className = 'chip' + (selected.includes(style) ? ' selected' : '');
    chip.textContent = style;
    chip.onclick = () => toggleStyle(style, chip);
    container.appendChild(chip);
  });
}

async function toggleStyle(style, chipEl) {
  if (!userData.travel_styles) userData.travel_styles = [];

  if (userData.travel_styles.includes(style)) {
    userData.travel_styles = userData.travel_styles.filter(s => s !== style);
    chipEl.classList.remove('selected');
  } else {
    userData.travel_styles.push(style);
    chipEl.classList.add('selected');
  }

  document.getElementById('statStyles').textContent = userData.travel_styles.length;
  await saveUserData({ travel_styles: userData.travel_styles });
}

function renderBudgetChips() {
  const container = document.getElementById('budgetChips');
  container.innerHTML = '';
  const selected = userData.budget || '';

  BUDGET_OPTIONS.forEach(budget => {
    const chip = document.createElement('span');
    chip.className = 'chip chip-teal' + (selected === budget ? ' selected' : '');
    chip.textContent = budget;
    chip.onclick = () => toggleBudget(budget, chip);
    container.appendChild(chip);
  });
}

async function toggleBudget(budget, chipEl) {
  const container = document.getElementById('budgetChips');

  if (userData.budget === budget) {
    userData.budget = '';
    chipEl.classList.remove('selected');
  } else {
    userData.budget = budget;
    container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    chipEl.classList.add('selected');
  }

  await saveUserData({ budget: userData.budget });
}

function renderLanguageChips() {
  const container = document.getElementById('languageChips');
  container.innerHTML = '';
  const selected = userData.languages || [];

  LANGUAGES.forEach(lang => {
    const chip = document.createElement('span');
    chip.className = 'chip chip-purple' + (selected.includes(lang) ? ' selected' : '');
    chip.textContent = lang;
    chip.onclick = () => toggleLanguage(lang, chip);
    container.appendChild(chip);
  });
}

async function toggleLanguage(lang, chipEl) {
  if (!userData.languages) userData.languages = [];

  if (userData.languages.includes(lang)) {
    userData.languages = userData.languages.filter(l => l !== lang);
    chipEl.classList.remove('selected');
  } else {
    userData.languages.push(lang);
    chipEl.classList.add('selected');
  }

  await saveUserData({ languages: userData.languages });
}

// ── Edit Profile Modal ──
function openEditModal() {
  document.getElementById('editName').value = userData.name || '';
  document.getElementById('editUsername').value = userData.username || '';
  document.getElementById('editBio').value = userData.bio || '';
  document.getElementById('editCity').value = userData.city || '';
  document.getElementById('editCountry').value = userData.country || '';
  document.getElementById('editBirthYear').value = userData.birth_year || '';
  document.getElementById('editInstagram').value = userData.instagram || '';
  document.getElementById('editWebsite').value = userData.website || '';
  document.getElementById('editModal').classList.add('open');
}

function closeEditModal() {
  document.getElementById('editModal').classList.remove('open');
}

async function saveProfile() {
  const updates = {
    name: document.getElementById('editName').value.trim(),
    username: document.getElementById('editUsername').value.trim(),
    bio: document.getElementById('editBio').value.trim(),
    city: document.getElementById('editCity').value.trim(),
    country: document.getElementById('editCountry').value.trim(),
    birth_year: document.getElementById('editBirthYear').value ? parseInt(document.getElementById('editBirthYear').value) : null,
    instagram: document.getElementById('editInstagram').value.trim(),
    website: document.getElementById('editWebsite').value.trim()
  };

  Object.assign(userData, updates);
  await saveUserData(updates);
  renderProfile();
  closeEditModal();
  showToast('Perfil actualizado', 'success');
}

// ── API Save ──
let saveTimeout = null;
async function saveUserData(data) {
  try {
    const res = await fetch(`${API_BASE}/api/me`, {
      method: 'PUT',
      headers: headers(),
      body: JSON.stringify(data)
    });
    if (!res.ok) throw new Error('Error guardando');
  } catch (err) {
    console.error(err);
    showToast('Error guardando cambios', 'error');
  }
}

// ── Toast ──
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transition = 'opacity .3s';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// ── Logout ──
function logout() {
  localStorage.removeItem('token');
  window.location.href = 'index.html';
}

// ── Close modals on overlay click ──
document.getElementById('editModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('editModal')) closeEditModal();
});
document.getElementById('connectionModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('connectionModal')) closeConnectionModal();
});

// ── Close modals on Escape ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeEditModal();
    closeConnectionModal();
  }
});
</script>
